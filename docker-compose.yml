version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile_inline: |
      FROM apache/airflow:2.9.1-python3.11
      USER root
      RUN apt-get update && apt-get install -y libgomp1 && rm -rf /var/lib/apt/lists/*
      USER airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # GCP 환경변수
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/service-account.json
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET}
    # Python 경로 (data_generator 모듈 접근)
    PYTHONPATH: /opt/airflow/data_generator
    # 추가 패키지 설치
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      faker>=24.0.0
      numpy>=1.26.0
      pandas>=2.2.0
      pyarrow>=15.0.0
      python-dotenv>=1.0.0
      google-cloud-storage>=2.16.0
      google-cloud-bigquery>=3.20.0
      db-dtypes>=1.2.0
      scikit-learn>=1.4.0
      xgboost>=2.0.0
      lightgbm>=4.3.0
      mlflow>=2.12.0
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data_generator:/opt/airflow/data_generator
    - ./data:/opt/airflow/data
    # GCP 서비스 계정 키 마운트
    - ${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/gcp/service-account.json:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL (Airflow 메타데이터 DB) ─────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── Airflow 초기화 (최초 1회) ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: on-failure

  # ── Airflow Webserver (UI: localhost:8080) ─────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── MLflow (실험 추적: localhost:5000) ─────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow
    restart: always

  # ── Streamlit 대시보드 (localhost:8501) ───────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    working_dir: /dashboard
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq libgomp1 &&
               pip install --quiet -r requirements.txt &&
               streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/dashboard
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/dashboard/gcp/service-account.json:ro
      - ./data:/dashboard/data:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /dashboard/gcp/service-account.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BIGQUERY_DATASET: ${BIGQUERY_DATASET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: always

volumes:
  postgres-db-volume:
